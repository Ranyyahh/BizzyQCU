<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizzyQCU – Enterprise Detail</title>
    <link rel="stylesheet" href="AdminEditEntrep.css" />  
    <link rel="stylesheet" href="Fonts.css" />
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="AdminLandingEntrep.html" class="back-btn" title="Back">&#8592;</a>
            <div class="nav-logo">
                <div class="logo-icon"></div>
            </div>
        </div>

        <div class="search-wrap">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search an Enterprise" autocomplete="off" />
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
            </div>
        </div>

        <div style="width: 120px;"></div>
    </header>

    <div class="page-wrapper">
        <div class="detail-layout">

            <div class="profile-card">

                <div class="profile-avatar" id="profileAvatar">
                    <!--
                        TODO (DB): replace this SVG with a real <img> tag once
                        enterprise profile photos are stored in the database.
                        e.g. <img src="{enterprise.profileImg}" alt="{enterprise.name}" />
                    -->
                    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#b0b8d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>

                <!--
                    TODO (DB): populate name, ID, stars, email, and status
                    from the enterprise record fetched by ID from the backend.
                -->
                <h2 class="profile-name" id="profileName">Enterprise Name</h2>

                <div class="profile-meta">
                    <span class="profile-id" id="profileId">BQCU0110</span>
                    <button class="delete-btn" id="deleteBtn">Delete Account</button>
                </div>

                <div class="profile-stars" id="profileStars">
                    <!-- TODO (DB): render stars dynamically from enterprise.rating -->
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star filled">★</span>
                    <span class="star">★</span>
                </div>

                <div class="profile-info">
                    <p>
                        <span class="info-label">Email:</span>
                        <!-- TODO (DB): replace with enterprise.email -->
                        <span class="info-value" id="profileEmail">EnterpriseQCU@gmail.com</span>
                    </p>
                    <p>
                        <span class="info-label">Status:</span>
                        <!-- TODO (DB): replace with enterprise.status; apply .status-approved / .status-pending / .status-rejected class accordingly -->
                        <span class="info-value status-approved" id="profileStatus">Approved</span>
                    </p>
                </div>

                <div class="profile-actions">
                    <!--
                        TODO (DB): wire these buttons to open the relevant
                        documents/listing data fetched from the backend.
                    -->
                    <button class="action-btn" id="viewDocsBtn">View Documents</button>
                    <button class="action-btn" id="viewListingBtn">View Listing Request</button>
                </div>

            </div>

            <div class="right-panel">

                <div class="product-card">
                    <div class="product-image-wrap">
                        <!--
                            TODO (DB): replace src with the selected product's image URL.
                            On search/select, update this image dynamically via JS.
                        -->
                        <img src="Images/ProductPlaceholder.png" alt="Product" class="product-img" id="productImg" />
                    </div>

                    <div class="product-info-wrap">
                        <div class="product-search-box">
                            <input type="text" id="productSearch" placeholder="Product" autocomplete="off" />
                            <button class="product-search-btn" id="productSearchBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                        </div>

                        <!--
                            TODO (DB): populate item name and price from the
                            product record matched by the search query.
                        -->
                        <div class="product-details" id="productDetails">
                            <p class="product-detail-line">
                                <span class="detail-label">Item Name:</span>
                                <span id="productName">Strawberry Shake</span>
                            </p>
                            <p class="product-detail-line">
                                <span class="detail-label">Price:</span>
                                <span id="productPrice">₱0.00</span>
                            </p>
                        </div>

                        <!--
                            TODO (DB): wire Remove Item to call the backend
                            endpoint that deletes this product listing by ID.
                        -->
                        <button class="remove-btn" id="removeItemBtn">Remove Item</button>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <!--
                            TODO (DB): update chart title and subtitle
                            dynamically based on the selected product/enterprise.
                        -->
                        <h3 class="chart-title" id="chartTitle">Daily Sales</h3>
                        <p class="chart-subtitle" id="chartSubtitle">Strawberry Flavor</p>
                    </div>

                    <div class="chart-wrap">
                        <canvas id="detailChart"></canvas>
                    </div>

                    <div class="chart-tabs">
                        <button class="chart-tab active" id="tabSales">Sales</button>
                        <button class="chart-tab" id="tabRatings">Ratings</button>
                    </div>
                </div>
              
            </div>    
        </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <div class="modal-icon-wrap">
                <div class="modal-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3,6 5,6 21,6" />
                        <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6" />
                        <path d="M10,11v6" />
                        <path d="M14,11v6" />
                        <path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2" />
                    </svg>
                </div>
            </div>
            <h2 class="modal-title">Delete Account?</h2>
            <p class="modal-body">
                You are about to permanently delete <strong id="modalEnterpriseName">this enterprise</strong>.
                This action cannot be undone.
            </p>
            <div class="modal-actions">
                <button class="modal-btn modal-cancel" id="cancelDelete">Cancel</button>
                <!--
                    TODO (DB): wire confirmDelete to call the backend DELETE
                    endpoint for this enterprise by ID, then redirect back
                    to AdminEnterprises.html on success.
                -->
                <button class="modal-btn modal-confirm" id="confirmDelete">Yes, Delete</button>
            </div>
        </div>
    </div>

    <script src="AdminEditEntrep.js"></script>
</body>
</html>
