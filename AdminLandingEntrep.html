<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizzyQCU – Enterprises</title>
    <link rel="stylesheet" href="AdminLandingEntrep.css" />
    <link rel="stylesheet" href="Fonts.css" />
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="LandingAdmin.html" class="back-btn" title="Back">&#8592;</a>
            <div class="nav-logo">
                <div class="logo-icon"></div>
            </div>
        </div>

        <div class="search-wrap">
            <div class="search-box">
                <input type="text"
                       id="searchInput"
                       placeholder="Search an Enterprise"
                       autocomplete="off" />
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
            </div>
        </div>

        <div style="width: 120px;"></div>
    </header>

    <div class="page-wrapper">

        <div class="page-header">
            <div class="page-header-left">
                <h1>Enterprises</h1>
                <p>Manage and view all registered enterprise accounts</p>
            </div>
            <!--
                TODO (DB): Replace the hardcoded count with the total number of
                enterprises fetched from the database.
                e.g. countBadge.textContent = data.length + ' Enterprises';
            -->
            <span class="count-badge" id="countBadge">9 Enterprises</span>
        </div>

        <!--
            ENTERPRISE CARDS GRID
            TODO (DB): When backend is ready, replace example cards below with
            renderCards(data) from AdminEnterprises.js.

            Each DB record needs: id, name, rating (0-5), profileImg, detailUrl.
            See AdminEnterprises.js for the renderCard(enterprise) function template.
        -->
        <!-- Cards are injected here by AdminEnterprises.js -->
        <div class="enterprises-grid" id="enterprisesGrid"></div>
        <!-- END ENTERPRISES GRID -->

    </div>

    <script src="AdminLandingEntrep.js"></script>
</body>
</html>
